<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Interactive To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My To Do List</h1>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Enter a task..." aria-label="Task description">
            <button id="addBtn" type="button">Add Task</button>
        </div>

        <ul id="taskList" aria-live="polite"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
